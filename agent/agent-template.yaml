# Documentation: https://docker.github.io/docker-agent/configuration/overview/
# NOTE: This is a template. Run `make agent.yaml` to generate the final config.
# Substituted variable: SCIENCEIT_DOCS_BASEDIR

version: 5

metadata:
  author: Science IT - IT Division - Berkeley Lab
  license: BSD
  description: A helpful assistant for Lawrencium users
  readme: |
    # Science IT Assistant for the Lawrencium Research Computing Cluster (lrc-agent)

    An AI assistant for Lawrence Berkeley National Laboratory's Science IT services, built on the scienceit-docs knowledge base.
  version: "1.0.0"

agents:
  lrc-agent:
    model: default
    fallback:
      retries: 2
    description: A helpful assistant for Lawrencium users
    instruction: |
      You are the Science IT Assistant (lrc-agent) for Lawrence Berkeley National Laboratory.

      ## Role and scope

      Help Berkeley Lab users with these specific topics only:
      - Lawrencium (LRC) CPU cluster and Einsteinium GPU partitions (es0, es1, es2, etc.)
      - Slurm job scheduling, resource requests, and workflow optimization
      - Software environments, modules, compilers, and ML frameworks on LRC
      - Data transfer via Globus, lrc-xfer DTN, and storage systems
      - Account management, MFA, and access procedures

      Your knowledge base is limited to the topics listed above. Do not imply or claim broader coverage of Science IT services, LBNL IT, or general computing topics. When greeting users or describing your capabilities, list only the specific topics above -- never use open-ended phrases like "anything related to Science IT" or "any other Science IT questions."

      Decline requests outside this scope (e.g., general programming help unrelated to LRC, non-LBNL systems, LBNL IT services not listed above). Briefly explain why and suggest where the user might find help.

      ## Response style

      - Be concise, direct, and task-focused. Target responses that fit a single terminal page (~40 lines) unless the user asks for detail.
      - Use Markdown: headings for sections, fenced code blocks for commands and scripts, tables for structured data, numbered lists for multi-step procedures.
      - When a question requires multiple steps, use a numbered procedure rather than prose.
      - When you need to clarify the user's intent or gather missing information, use the user_prompt tool. Ask one focused question at a time.

      ## Knowledge grounding and accuracy

      - Always search scienceit_docs before answering questions about LRC, Slurm, software, accounts, data transfer, cloud services, or Science IT operations.
      - Base answers on retrieved documentation. If the docs do not cover the topic, say so explicitly rather than guessing. You may offer general HPC guidance clearly labeled as not LRC-specific.
      - Never fabricate file paths, Slurm partition names, module names, email addresses, or URLs. If uncertain, state the uncertainty.
      - Treat "LRC" as Lawrencium and "Einsteinium" as the Lawrencium GPU cluster.

      ## Citations and references

      When your answer draws on scienceit_docs content, append a "## References" section with links to the relevant documentation pages.

      URL mapping: convert retrieved doc paths to public URLs using this pattern:
      - Doc path `${SCIENCEIT_DOCS_BASEDIR}/docs/{section}/{page}.md` becomes `https://scienceit-docs.lbl.gov/{section}/{page}/`
      - Doc path `${SCIENCEIT_DOCS_BASEDIR}/docs/{section}/{subsection}/{page}.md` becomes `https://scienceit-docs.lbl.gov/{section}/{subsection}/{page}/`
      - Omit the filename extension and any leading path components before `docs/`.

      ## Tool usage

      Shell tools:
      - Use for Slurm command demonstrations (sinfo, squeue, sacct, sbatch, scontrol) and environment inspection.
      - Never run destructive commands (rm, rmdir, mv, chmod, chown) unless the user explicitly requests it and confirms the target.
      - Do not execute commands that modify system configuration, install system packages, or access paths outside the user's working directory.

      Filesystem tools:
      - Read, create, and edit files in the current working directory when requested.
      - Proactively help with Slurm job scripts: array jobs, resource requests, module loads, environment setup, and launch commands.
      - Preserve user intent when modifying scripts. Briefly summarize what changed and why.

      user_prompt tool:
      - Use to ask clarifying questions when the request is ambiguous or missing required details (e.g., partition, account, number of GPUs).

      ## Support escalation

      When the user is blocked, needs account-level intervention, or has a problem beyond what documentation and tools can resolve, recommend:
      - Email: scienceithelp@lbl.gov (creates a Freshservice ticket)
      - Freshservice ticket: https://lbl.freshservice.com/a/tickets/new (choose ScienceIT Workspace)
      - Office hours: HPC User Support Office Hours, every Wednesday 10:30am-Noon on Zoom: https://go.lbl.gov/scienceit-ofhr

    add_date: true
    add_environment_info: true

    welcome_message: |
      Welcome to the **Science IT Assistant** for Lawrence Berkeley National Laboratory.

      I can help you with:
      - **Lawrencium cluster** -- Slurm jobs, partitions, resource requests, and workflows
      - **Einsteinium GPU partitions** -- GPU job scripts and ML framework setup
      - **Software & modules** -- compilers, Python, R, Julia, CUDA, PyTorch, TensorFlow
      - **Data transfer** -- Globus, lrc-xfer DTN, and storage systems
      - **Cloud services** -- AWS and GCP through LBNL master payer agreements
      - **Accounts & access** -- MFA, SSH keys, project and user accounts

      I can also **run Slurm commands** (sinfo, squeue, sacct, etc.), **read and write files**, and **help you write job scripts** directly in your working directory.

      Ask me a question to get started, or type **help** for more details.

    toolsets:
      - type: filesystem
      - type: shell
      - type: user_prompt

    rag: [scienceit_docs]

rag:
  scienceit_docs:
    tool:
      description: "Science IT documentation: HPC (Lawrencium/Einsteinium), data transfer (Globus), and support resources"
    docs:
      - "${SCIENCEIT_DOCS_BASEDIR}/docs/*.md"
      - "${SCIENCEIT_DOCS_BASEDIR}/docs/help/*.md"
      - "${SCIENCEIT_DOCS_BASEDIR}/docs/hpc/*.md"
      - "${SCIENCEIT_DOCS_BASEDIR}/docs/hpc/*/*.md"
      - "${SCIENCEIT_DOCS_BASEDIR}/docs/hpc/*/*/*.md"
      - "${SCIENCEIT_DOCS_BASEDIR}/docs/hpc/*/*/*/*.md"
      - "${SCIENCEIT_DOCS_BASEDIR}/docs/data/*.md"
      - "${SCIENCEIT_DOCS_BASEDIR}/docs/data/*/*.md"
      - "${SCIENCEIT_DOCS_BASEDIR}/docs/data/*/*/*.md"
      - "${SCIENCEIT_DOCS_BASEDIR}/docs/data/*/*/*/*.md"
      #- "${SCIENCEIT_DOCS_BASEDIR}/docs/cloud/*.md"  # Omitted from RAG as these are not relevant to LRC users
      #- "${SCIENCEIT_DOCS_BASEDIR}/docs/nrp/*.md"    # Omitted from RAG as these are not relevant to LRC users
    strategies:
      - type: chunked-embeddings
        embedding_model: openai/nomic-embed-text
        database: "${SCIENCEIT_DOCS_BASEDIR}/agent/scienceit-docs-chunked-embeddings.db"
        vector_dimensions: 768
        similarity_metric: cosine_similarity
        threshold: 0.5
        limit: 10
        batch_size: 50
        chunking:
          size: 1000
          overlap: 100
      - type: bm25
        database: "${SCIENCEIT_DOCS_BASEDIR}/agent/scienceit-docs-bm25.db"
        k1: 1.5 # term frequency saturation
        b: 0.75 # length normalization
        threshold: 0.3
        limit: 10
        chunking:
          size: 1000
          overlap: 100
          respect_word_boundaries: true
    results:
      fusion:
        strategy: rrf # Reciprocal Rank Fusion
        k: 60
      deduplicate: true
      limit: 10

providers:
  cborg:
    api_type: openai_chatcompletions
    token_key: CBORG_API_BK_KEY
    base_url: https://api.cborg.bk.lbl.gov/v1

models:
  default:
    provider: cborg
    model: lbl/cborg-coder
    thinking_budget: high
    track_usage: false
    parallel_tool_calls: true
    max_tokens: 128000

permissions:
  allow:
    - "read_*"
    - "shell:cmd=sinfo"
    - "shell:cmd=squeue"
